packages:
  - "packages/*"
  - "../ts-pure-sdk"

# pnpm 10 only runs native build scripts for allowlisted packages, and the
# allowlist must live at the workspace root. better-sqlite3 needs its native
# addon compiled — @satora/swap re-exports the legacy SDK's sqlite storage
# (via `@satora/swap/node`), so consumers resolving it through this workspace
# (e.g. the e2e-ts harness) need the binding built here.
onlyBuiltDependencies:
  - better-sqlite3
  - bufferutil
  - esbuild
  - utf-8-validate
