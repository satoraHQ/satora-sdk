name: ESM Export Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: ts-pure-sdk

jobs:
  esm-check:
    name: Verify ESM exports
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check .js extensions in imports
        run: node scripts/check-esm-imports.js

      - name: Build
        run: npm run build

      - name: Verify ESM imports resolve
        run: node --input-type=module -e "
          await import('./dist/index.js');
          console.log('dist/index.js — OK');
          await import('./dist/delegate.js');
          console.log('dist/delegate.js — OK');
          await import('./dist/node.js');
          console.log('dist/node.js — OK');
          "
